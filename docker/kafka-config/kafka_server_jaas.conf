// JAAS configuration for Kafka SASL/PLAIN authentication -- REFERENCE ONLY
//
// This file is NOT mounted into the container.  The active JAAS config is
// generated at container startup from the credentials in docker/.env by the
// entrypoint script in docker-compose.yml.
//
// Keep this file in sync with the template in the entrypoint command so the
// expected credential layout stays documented.

KafkaServer {
    org.apache.kafka.common.security.plain.PlainLoginModule required
    username="admin"
    password="admin-secret"
    user_admin="admin-secret"
    user_kv8producer="kv8secret";
};
